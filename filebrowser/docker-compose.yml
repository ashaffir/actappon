services:
  filebrowser:
    image: filebrowser/filebrowser
    container_name: filebrowser
    expose:
      - 8090
    networks:
      - external_network
    volumes:
      - /home/alfreds/:/srv
      - /home/alfreds/proj/actappon/filebrowser/database/filebrowser.db:/database/filebrowser.db  
      - /home/alfreds/proj/actappon/filebrowser/config/settings.json:/config/settings.json  
    environment:
      - PUID=1000
      - PGID=1000
    restart: unless-stopped

networks:
  external_network:
    external:
      name: actappon_wordpress_network
